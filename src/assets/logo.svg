<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Text path for top semi-circle -->
    <path id="textPathTop" d="M 23,100 A 77,77 0 0,1 177,100" fill="none" />
  </defs>
  
  <!-- Outer Dark Blue Circle -->
  <circle cx="100" cy="100" r="96" fill="#0c2473" />
  
  <!-- Inner Bright Green Circle -->
  <circle cx="100" cy="100" r="72" fill="#00ff2b" />
  
  <!-- White Ring for Text -->
  <circle cx="100" cy="100" r="84" fill="none" stroke="#ffffff" stroke-width="12" />
  
  <!-- Inner White Border for Green Circle -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="#ffffff" stroke-width="2" />
  
  <!-- Central Graphics (Purple Figures) -->
  <!-- Left Figure Gown -->
  <path d="M 68,125 C 68,108 85,108 85,125 L 87,148 L 66,148 Z" fill="#800080" />
  <!-- Left Head -->
  <circle cx="76.5" cy="102" r="8" fill="#800080" />
  <!-- Left Mortarboard -->
  <polygon points="76.5,88 88,92 76.5,96 65,92" fill="#800080" />
  <rect x="75" y="93" width="3" height="5" fill="#800080" />
  
  <!-- Right Figure Gown -->
  <path d="M 132,125 C 132,108 115,108 115,125 L 113,148 L 134,148 Z" fill="#800080" />
  <!-- Right Head -->
  <circle cx="123.5" cy="102" r="8" fill="#800080" />
  <!-- Right Mortarboard -->
  <polygon points="123.5,88 135,92 123.5,96 112,92" fill="#800080" />
  <rect x="122" y="93" width="3" height="5" fill="#800080" />
  
  <!-- Central Leaf/Lotus Base (Purple) -->
  <!-- Main bottom curves -->
  <path d="M 45,138 C 55,145 65,150 75,152 C 60,144 48,132 42,122 C 45,127 50,132 50,132 Z" fill="#800080" />
  <path d="M 155,138 C 145,145 135,150 125,152 C 140,144 152,132 158,122 C 155,127 150,132 150,132 Z" fill="#800080" />
  <!-- Lower wings/leaves -->
  <path d="M 52,150 C 65,158 75,160 85,161 C 70,156 60,148 54,140" fill="#800080" />
  <path d="M 148,150 C 135,158 125,160 115,161 C 130,156 140,148 146,140" fill="#800080" />
  <!-- Base Horizontal Book Shape -->
  <path d="M 55,166 L 145,166 C 135,170 110,172 100,172 C 90,172 65,170 55,166 Z" fill="#800080" />
  
  <!-- Holding Hands / High Five connection -->
  <path d="M 82,120 C 90,110 110,110 118,120" fill="none" stroke="#800080" stroke-width="4.5" stroke-linecap="round" />
  
  <!-- Curved Text: WIZARD TUITION CENTRE (positioned in white ring) -->
  <text font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="10" letter-spacing="1">
    <textPath href="#textPathTop" startOffset="50%" text-anchor="middle" fill="#2e7d32">WIZARD TUITION CENTRE</textPath>
  </text>
</svg>
